<!DOCTYPE html>
<html>
<head>
  <title>Analytics</title>
  <link rel="stylesheet" href="../css/styles.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    /* ===== MAIN ===== */
    .main {
      margin-left: 220px;
      padding: 30px 40px;
    }

    /* ===== TITLE ===== */
    .title {
      font-size: 26px;
      font-weight: 600;
      color: #a78bfa;
      margin-bottom: 5px;
    }

    .subtitle {
      color: #9ca3af;
      margin-bottom: 20px;
      font-size: 14px;
    }

    /* ===== GRID ===== */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    /* ===== CARD ===== */
    .card {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(139, 92, 246, 0.15);
      border-radius: 14px;
      backdrop-filter: blur(8px);
      padding: 15px;
    }

    .card h3 {
      font-size: 15px;
      color: #d1d5db;
      margin-bottom: 10px;
    }

    .card h2 {
      font-size: 22px;
      color: #a78bfa;
    }

    /* ===== CHART FIX ===== */
    .chart-box {
      height: 220px;
      position: relative;
      padding: 0;
    }

    .full-width {
      grid-column: 1 / -1;
      height: 240px;
      position: relative;
    }

    canvas {
      position: absolute;
      width: 100% !important;
      height: 100% !important;
      top: 0;
      left: 0;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .chart-grid {
        grid-template-columns: 1fr;
      }
    }
    

  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">📍 Trackora</div>
  <a class="nav-item" href="dashboard.html">🏠 Dashboard</a>
  <a class="nav-item" href="tracking.html">📍 Live Tracking</a>
  <a class="nav-item" href="sos.html">🚨 SOS</a>
  <a class="nav-item" href="analytics.html">📊 Analytics</a>
  <a class="nav-item" href="profile.html">👤 Profile</a>
  <a class="nav-item" href="admin.html">👑 Admin</a>
  <a class="nav-item" href="login.html">🚪 Logout</a>
  <a class="nav-item active" href="analytics.html">Analytics</a>
</div>

<!-- MAIN -->
<div class="main">

<h1 class="title glow-text"> Analytics Dashboard</h1>
<p class="subtitle">Last 7 Days Activity</p>

<!-- STATS -->
<div class="grid">
  <div class="card">
    <h3>Today's location updates</h3>
    <h2 id="total">0</h2>
  </div>

  <div class="card">
    <h3>Active Users</h3>
    <h2 id="users">0</h2>
  </div>
</div>

<!-- CHARTS -->
<div class="chart-grid">

  <!-- LINE -->
  <div class="card chart-box">
    <h3>📈 Movement Trend</h3>
    <canvas id="lineChart"></canvas>
  </div>

  <!-- PIE -->
  <div class="card chart-box">
    <!-- <h3>🥧 Activity Split</h3>-->
    <canvas id="pieChart"></canvas>
  </div>

</div>

<!-- BAR -->
<div class="card chart-box full-width" style="margin-top:20px;">
  <h3>📊 Daily Activity</h3>
  <canvas id="barChart"></canvas>
</div>

</div>

<!-- SCRIPT -->
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://cjvsaqgomgzygkcryaom.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqdnNhcWdvbWd6eWdrY3J5YW9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzIxOTYsImV4cCI6MjA5MjM0ODE5Nn0.Yyk-99H6T17pZYgDTefZ2QblLB6RUtmMvo9U4dHfMSs"
)

const user_id = localStorage.getItem("user_id")
if (!user_id) window.location.href = "login.html"

let lineChart, barChart, pieChart

async function loadAnalytics() {

  // 📅 TODAY DATE
  const today = new Date().toISOString().split("T")[0]

  // 🔥 TODAY LOCATIONS (NOT TOTAL DB)
  const { data: todayLocations } = await supabase
    .from("locations")
    .select("user_id, created_at")
    .gte("created_at", today)

  // 👥 UNIQUE USERS
  const uniqueUsers = [...new Set((todayLocations || []).map(x => x.user_id))]

  // 📊 LAST 7 DAYS DATA
  const last7 = []

  for (let i = 6; i >= 0; i--) {

    const date = new Date()
    date.setDate(date.getDate() - i)

    const start = date.toISOString().split("T")[0]
    const end = new Date(date.getTime() + 86400000).toISOString()

    const { data } = await supabase
      .from("locations")
      .select("id")
      .gte("created_at", start)
      .lt("created_at", end)

    last7.push(data?.length || 0)
  }

  const labels = ["6d","5d","4d","3d","2d","1d","Today"]

  // 🧠 UPDATE UI (SMART VALUES)
  document.getElementById("total").innerText = todayLocations?.length || 0
  document.getElementById("users").innerText = uniqueUsers.length

  // 🔄 DESTROY OLD CHARTS
  if (lineChart) lineChart.destroy()
  if (barChart) barChart.destroy()
  if (pieChart) pieChart.destroy()

  // 📈 LINE
  lineChart = new Chart(document.getElementById("lineChart"), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Daily Tracking Events',
        data: last7,
        borderColor: '#8b5cf6',
        backgroundColor: 'rgba(139,92,246,0.2)',
        fill: true,
        tension: 0.4
      }]
    }
  })

  // 🥧 PIE
  pieChart = new Chart(document.getElementById("pieChart"), {
    type: 'doughnut',
    data: {
      labels: ['Events Today', 'Active Users'],
      datasets: [{
        data: [
          todayLocations?.length || 0,
          uniqueUsers.length
        ],
        backgroundColor: ['#8b5cf6', '#6366f1']
      }]
    }
  })

  // 📊 BAR
  barChart = new Chart(document.getElementById("barChart"), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Daily Activity',
        data: last7,
        backgroundColor: '#8b5cf6'
      }]
    }
  })
}


// 🚀 INITIAL LOAD
loadAnalytics()


// 🔥 REAL-TIME UPDATE
supabase
  .channel('live-locations')
  .on(
    'postgres_changes',
    { event: '*', schema: 'public', table: 'locations' },
    () => {
      loadAnalytics()
    }
  )
  .subscribe()

</script>
</body>
</html>
