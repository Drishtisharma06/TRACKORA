<!DOCTYPE html>
<html>
<head>
  <title>Edit Profile</title>
  <link rel="stylesheet" href="../css/styles.css">

  <style>
    .edit-container {
      width: 750px;
      margin: auto;
      background: rgba(15, 23, 42, 0.85);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 40px rgba(99,102,241,0.2);
    }

    .form-title {
      margin-bottom: 20px;
      color: #a78bfa;
    }

    .avatar-section {
      text-align: center;
      margin-bottom: 20px;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      margin: auto;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      color: white;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(139,92,246,0.6);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar:hover {
      transform: scale(1.05);
      transition: 0.3s;
    }

    .upload-text {
      display: block;
      margin-top: 8px;
      font-size: 13px;
      color: #a78bfa;
      cursor: pointer;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group.full {
      grid-column: span 2;
    }

    .form-group label {
      font-size: 13px;
      margin-bottom: 5px;
      color: #9ca3af;
    }

    .input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #020617;
      color: white;
    }

    .btn-row {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .cancel-btn {
      padding: 10px 15px;
      border: none;
      background: #374151;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .save-btn {
      padding: 10px 15px;
      border: none;
      background: #f97316;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .msg {
      margin-top: 10px;
      text-align: center;
    }

    .error { color: red; }
    .success { color: #22c55e; }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">📍 Trackora</div>

  <a class="nav-item" href="dashboard.html">🏠 Dashboard</a>
  <a class="nav-item" href="tracking.html">📍 Live Tracking</a>
  <a class="nav-item" href="sos.html">🚨 SOS</a>
  <a class="nav-item" href="analytics.html">📊 Analytics</a>
  <a class="nav-item" href="profile.html">👤 Profile</a>
  <a class="nav-item" href="admin.html">👑 Admin</a>
  <a class="nav-item" href="login.html">🚪 Logout</a>
  <a class="nav-item active" href="edit-profile.html">Edit Profile</a>
</div>

<div class="main center">

<div class="edit-container">

  <h2 class="form-title">Edit Profile</h2>

  <!-- ✅ AVATAR -->
  <div class="avatar-section">
    <div class="avatar" id="avatar">U</div>

    <label class="upload-text">
      Change Photo
      <input type="file" id="photoInput" hidden onchange="uploadPhoto()">
    </label>
    <button onclick="removePhoto()" style="margin-top:10px; background:#374151; color:white; border:none; padding:6px 10px; border-radius:6px; cursor:pointer;">
  Remove Photo
</button>
  </div>

  <!-- ✅ FORM -->
  <div class="form-grid">

    <div class="form-group">
      <label>Full Name</label>
      <input id="name" class="input">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input id="email" class="input">
    </div>

    <div class="form-group full">
      <label>Address</label>
      <input id="address" class="input">
    </div>

    <div class="form-group">
      <label>Phone</label>
      <input id="phone" class="input">
    </div>

    <div class="form-group">
      <label>Emergency</label>
      <input id="emergency" class="input">
    </div>

    <div class="form-group">
      <label>City</label>
      <input id="City" class="input">
    </div>

    <div class="form-group">
      <label>Country</label>
      <input id="Country" class="input">
    </div>

    <div class="form-group">
      <label>Date of Birth</label>
      <input id="dob" type="date" class="input">
    </div>

    <div class="form-group">
      <label>Gender</label>
      <select id="gender" class="input">
        <option value="">Select</option>
        <option>Female</option>
        <option>Male</option>
        <option>Other</option>
      </select>
    </div>

  </div>

  <!-- ✅ BUTTONS -->
  <div class="btn-row">
    <button class="cancel-btn" onclick="goBack()">Cancel</button>
    <button class="save-btn" onclick="saveProfile()">Save</button>
  </div>

  <p id="msg" class="msg"></p>

</div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://cjvsaqgomgzygkcryaom.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqdnNhcWdvbWd6eWdrY3J5YW9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzIxOTYsImV4cCI6MjA5MjM0ODE5Nn0.Yyk-99H6T17pZYgDTefZ2QblLB6RUtmMvo9U4dHfMSs"
)


// 🔤 AVATAR
function setAvatar(name, photo) {
  const avatar = document.getElementById("avatar");

  if (photo) {
    avatar.innerHTML = `<img src="${photo}">`;
  } else {
    avatar.innerText = (name || "U").charAt(0).toUpperCase();
  }
}
window.removePhoto = async function () {

  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  // ✅ DB update
  const { error } = await supabase
    .from("profiles")
    .update({ photo: null })
    .eq("id", user.id);

  if (error) {
    alert("❌ Error removing photo");
    return;
  }

  // ✅ Reset avatar to first letter
  const name = document.getElementById("name").value;
  setAvatar(name, null);

  alert("✅ Photo removed");
};

// 📥 LOAD PROFILE FROM DB
window.onload = async function () {

  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const { data, error } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  if (error) {
    console.log(error);
    return;
  }

  // Fill form
  document.getElementById("name").value = data.username || "";
  document.getElementById("email").value = user.email || "";
  document.getElementById("phone").value = data.phone || "";
  document.getElementById("emergency").value = data.emergency || "";
  document.getElementById("address").value = data.address || "";
  document.getElementById("City").value = data.city || "";
  document.getElementById("Country").value = data.country || "";
  document.getElementById("dob").value = data.dob || "";
  document.getElementById("gender").value = data.gender || "";

  setAvatar(data.username, data.photo);
};


// 📷 PHOTO UPLOAD
window.uploadPhoto = async function () {
  const file = document.getElementById("photoInput").files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = async function(e) {
    const base64 = e.target.result;

    const { data: { user } } = await supabase.auth.getUser();

    await supabase
      .from("profiles")
      .update({ photo: base64 })
      .eq("id", user.id);

    setAvatar(null, base64);
  };

  reader.readAsDataURL(file);
};


// 💾 SAVE PROFILE TO DB
window.saveProfile = async function () {

  const msg = document.getElementById("msg");

  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();

  if (!name || !phone) {
    msg.innerText = "⚠️ Name & Phone required";
    msg.className = "msg error";
    return;
  }

  const { error } = await supabase
    .from("profiles")
    .update({
      username: name,
      phone: phone,
      emergency: document.getElementById("emergency").value,
      address: document.getElementById("address").value,
      city: document.getElementById("City").value,
      country: document.getElementById("Country").value,
      dob: document.getElementById("dob").value,
      gender: document.getElementById("gender").value
    })
    .eq("id", user.id);

  if (error) {
    msg.innerText = "❌ " + error.message;
    msg.className = "msg error";
    return;
  }

  msg.innerText = "✅ Profile Updated!";
  msg.className = "msg success";

  setTimeout(() => {
    window.location.href = "profile.html";
  }, 1200);
};


// 🔙 BACK
window.goBack = function () {
  window.location.href = "profile.html";
};


// 🚪 LOGOUT
window.logout = async function () {
  await supabase.auth.signOut();
  window.location.href = "login.html";
};

</script>
</body>
</html>
