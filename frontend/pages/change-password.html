<!DOCTYPE html>
<html>
<head>
  <title>Change Password</title>
  <link rel="stylesheet" href="../css/styles.css">

  <style>
    .pass-card {
      width: 400px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 0 40px rgba(99,102,241,0.2);
    }

    .title {
      text-align: center;
      margin-bottom: 20px;
      color: #a78bfa;
    }

    .msg {
      margin-top: 10px;
      font-size: 14px;
      text-align: center;
    }

    .success {
      color: #22c55e;
    }

    .error {
      color: #ef4444;
    }

    .back-btn {
      margin-top: 15px;
      display: block;
      text-align: center;
      cursor: pointer;
      opacity: 0.7;
    }
    .input-box {
  position: relative;
}

.input-box span {
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 18px;
  opacity: 0.7;
}

.input-box span:hover {
  opacity: 1;
}
  </style>
</head>

<body>
  <!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">📍 Trackora</div>

  <a class="nav-item" href="dashboard.html">🏠 Dashboard</a>
  <a class="nav-item" href="tracking.html">📍 Live Tracking</a>
  <a class="nav-item" href="sos.html">🚨 SOS</a>
  <a class="nav-item" href="analytics.html">📊 Analytics</a>
  <a class="nav-item" href="profile.html">👤 Profile</a>
  <a class="nav-item" href="admin.html">👑 Admin</a>
  <a class="nav-item" href="login.html">🚪 Logout</a>
  <a class="nav-item active" href="change-password.html"> Change Password</a>
</div>

<div class="main center">

<div class="pass-card">

<h2 class="title">🔐 Change Password</h2>

<div class="input-box">
  <div class="input-box">
  <input id="oldPassword" type="password" class="input" placeholder="Enter Old Password">
  <span onclick="togglePassword('oldPassword', this)">👁</span>
</div>

<div class="input-box">
  <input id="newPassword" type="password" class="input" placeholder="Enter New Password">
  <span onclick="togglePassword('newPassword', this)">👁</span>
</div>

<div class="input-box">
  <input id="confirmPassword" type="password" class="input" placeholder="Confirm New Password">
  <span onclick="togglePassword('confirmPassword', this)">👁</span>
</div>
</div>

<button class="btn" onclick="changePassword()" style="width:100%; margin-top:15px;">
  Update Password
</button>

<p id="msg" class="msg"></p>

<p class="back-btn" onclick="goBack()">⬅ Back to Profile</p>

</div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://cjvsaqgomgzygkcryaom.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqdnNhcWdvbWd6eWdrY3J5YW9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzIxOTYsImV4cCI6MjA5MjM0ODE5Nn0.Yyk-99H6T17pZYgDTefZ2QblLB6RUtmMvo9U4dHfMSs"
)
// 🔐 CHANGE PASSWORD
window.changePassword = async function () {

  const newPass = document.getElementById("newPassword").value.trim();
  const confirmPass = document.getElementById("confirmPassword").value.trim();

  const msg = document.getElementById("msg");

  // ❌ Empty
  if (!newPass || !confirmPass) {
    msg.innerText = "⚠️ All fields are required";
    msg.className = "msg error";
    return;
  }

  // ❌ Length
  if (newPass.length < 6) {
    msg.innerText = "⚠️ Password must be at least 6 characters";
    msg.className = "msg error";
    return;
  }

  // ❌ Match
  if (newPass !== confirmPass) {
    msg.innerText = "❌ Passwords do not match";
    msg.className = "msg error";
    return;
  }

  // 🔐 Check user session
  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  // ✅ UPDATE PASSWORD
  const { error } = await supabase.auth.updateUser({
    password: newPass
  });

  if (error) {
    msg.innerText = "❌ " + error.message;
    msg.className = "msg error";
    return;
  }

  msg.innerText = "✅ Password Updated Successfully!";
  msg.className = "msg success";

  // 🔄 Force logout after change (security)
  setTimeout(async () => {
    await supabase.auth.signOut();
    window.location.href = "login.html";
  }, 1500);
};


// 🔙 BACK
window.goBack = function () {
  window.location.href = "profile.html";
};


// 👁 TOGGLE PASSWORD
window.togglePassword = function(id, icon) {
  const input = document.getElementById(id);

  if (input.type === "password") {
    input.type = "text";
    icon.textContent = "🙈";
  } else {
    input.type = "password";
    icon.textContent = "👁";
  }
};

</script>

</body>
</html>
